name: Build Release and Docker

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".editorconfig"

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "9.0.x"
  CONFIGURATION: Release
  PROJECT_PATH: "src/TelegramMonitor.csproj"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tgjk

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.ver.outputs.VERSION }}
      IMAGE_NAME_LC: ${{ steps.ver.outputs.IMAGE_NAME_LC }}
    steps:
      - id: ver
        shell: bash
        run: |
          VERSION="1.$(TZ='Asia/Shanghai' date +'%Y%m%d.%H%M')"
          IMAGE_NAME_LC=$(echo "ghcr.io/${{ github.repository_owner }}/tgjk" | tr '[:upper:]' '[:lower:]')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > version.txt
      - uses: actions/upload-artifact@v4
        with:
          name: version
          path: version.txt
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: linux-x64, rid: linux-x64, arch: amd64, artifact: tgjk-linux-x64.tar.gz, pack: "tar -czf", docker: true }
          - { name: linux-arm64, rid: linux-arm64, arch: arm64, artifact: tgjk-linux-arm64.tar.gz, pack: "tar -czf", docker: true }
          - { name: osx-x64, rid: osx-x64, artifact: tgjk-osx-x64.zip, pack: "zip -r -q", docker: false }
          - { name: osx-arm64, rid: osx-arm64, artifact: tgjk-osx-arm64.zip, pack: "zip -r -q", docker: false }
          - { name: windows-x86, rid: win-x86, artifact: tgjk-windows-x86.zip, pack: "zip -r -q", docker: false }
          - { name: windows-x64, rid: win-x64, artifact: tgjk-windows-x64.zip, pack: "zip -r -q", docker: false }
          - { name: windows-arm64, rid: win-arm64, artifact: tgjk-windows-arm64.zip, pack: "zip -r -q", docker: false }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" \
            --configuration "$CONFIGURATION" \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o "out/${{ matrix.rid }}"
          find "out/${{ matrix.rid }}" -type f \( -name '*.pdb' -o -name '*.xml' \) -delete
          cd "out/${{ matrix.rid }}"
          ${{ matrix.pack }} "../${{ matrix.artifact }}" .
          cd ../..
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: out/${{ matrix.artifact }}
          retention-days: 3

  docker-build:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: out/linux-amd64
      - uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: out/linux-arm64
      - uses: actions/download-artifact@v4
        with:
          name: version
          path: .
      - name: Prepare binaries
        run: |
          tar -xzf out/linux-amd64/tgjk-linux-x64.tar.gz -C out/linux-amd64 --strip-components=1
          chmod +x out/linux-amd64/tgjk

          tar -xzf out/linux-arm64/tgjk-linux-arm64.tar.gz -C out/linux-arm64 --strip-components=1
          chmod +x out/linux-arm64/tgjk
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ver
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-platform image
        run: |
          IMAGE_NAME_LC=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BIN_NAME=tgjk \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --provenance=false \
            --sbom=false \
            --push \
            -t $IMAGE_NAME_LC:latest \
            -t $IMAGE_NAME_LC:${{ steps.ver.outputs.VERSION }} \
            .

          echo "=== Verifying multi-platform manifest ==="
          docker buildx imagetools inspect $IMAGE_NAME_LC:latest
          docker buildx imagetools inspect $IMAGE_NAME_LC:${{ steps.ver.outputs.VERSION }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - id: meta
        run: |
          echo "DATETIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.VERSION }}
          name: "Release ${{ needs.prepare.outputs.VERSION }}"
          body: |
            **Release Time:** ${{ steps.meta.outputs.DATETIME }}
            **Publisher:** ${{ github.actor }}

            **Changes**
            ${{ steps.meta.outputs.COMMIT_MSG }}

            **Assets**
            - Windows x64: `tgjk-windows-x64.zip`
            - Windows x86: `tgjk-windows-x86.zip`
            - Windows ARM64: `tgjk-windows-arm64.zip`
            - Linux x64: `tgjk-linux-x64.tar.gz`
            - Linux ARM64: `tgjk-linux-arm64.tar.gz`
            - macOS x64: `tgjk-osx-x64.zip`
            - macOS ARM64: `tgjk-osx-arm64.zip`

            **Linux One-Line Install**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-linux.sh | bash -s -- ${{ github.repository }}
            ```
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
